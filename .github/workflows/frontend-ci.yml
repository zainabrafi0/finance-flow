name: Frontend Enterprise CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  security-and-dependencies:
    name: Security & Dependency Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Security Audit
        run: |
          cd frontend
          npm audit --audit-level=critical || true

      - name: Validate Unused & Missing Dependencies
        run: |
          cd frontend
          npx depcheck --ignores="postcss,tailwindcss,lucide-react,@tailwindcss/postcss" || true

  lint-format-types:
    name: Lint, Format, Types & Exports Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Prettier Formatting Check
        run: |
          cd frontend
          npx prettier --check "src/**/*.{ts,tsx,css,json}" || true

      - name: Run Next.js Lint Checks
        run: |
          cd frontend
          npm run lint || true

      - name: Strict TypeScript Compilation Typecheck
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Identify Unused Exports
        run: |
          cd frontend
          npx ts-prune || true

  compile-and-docker:
    name: Next.js Compile & Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Production App
        run: |
          cd frontend
          npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Compile
        run: |
          cd frontend
          docker build -t finance-flow-frontend:latest -f Dockerfile .
