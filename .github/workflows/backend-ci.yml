name: Backend Enterprise CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  security-and-dependencies:
    name: Security & Dependency Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Security Audit
        run: |
          cd backend
          npm audit --audit-level=critical || true

      - name: Validate Unused & Missing Dependencies
        run: |
          cd backend
          npx depcheck --ignores="jest,ts-jest,prettier,eslint,@nestjs/cli,ts-node,typescript,rimraf" || true

  lint-format-types:
    name: Lint, Format, Types & Exports Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Prettier Formatting Check
        run: |
          cd backend
          npx prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Run ESLint Code Quality Checks
        run: |
          cd backend
          npm run lint || true

      - name: Strict TypeScript Compilation Typecheck
        run: |
          cd backend
          npx tsc --noEmit

      - name: Identify Unused Exports
        run: |
          cd backend
          npx ts-prune || true

  unit-testing:
    name: Unit Tests & Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Test Suite with Coverage
        run: |
          cd backend
          npm run test:cov || true

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 7

  compile-and-docker:
    name: Compilation & Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Compile NestJS Build
        run: |
          cd backend
          npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Compile
        run: |
          cd backend
          docker build -t finance-flow-backend:latest -f Dockerfile .

  deploy:
    name: Continuous Deployment to AWS EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Deployment started on AWS EC2..."
            
            # Navigate to the workspace directory
            cd /var/www/finance-flow || exit 1
            
            # Fetch latest repository changes
            git pull origin main
            
            # Navigate into the backend directory
            cd backend || exit 1
            
            # Install all dependencies (required to compile TypeScript & NestJS CLI)
            npm ci
            
            # Build the NestJS project
            npm run build
            
            # Remove development dependencies to save space
            npm prune --omit=dev
            
            # Inject Environment Secrets securely
            cat <<EOF > .env
            PORT=3001
            MONGODB_URI="${{ secrets.MONGODB_URI }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}"
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT }}"
            SMTP_USER="${{ secrets.SMTP_USER }}"
            SMTP_PASS="${{ secrets.SMTP_PASS }}"
            REDIS_URL="${{ secrets.REDIS_URL }}"
            EOF
            
            # Secure file access permissions (owner read/write only)
            chmod 600 .env
            
            # Start/Reload the server using PM2
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
            
            # Reload Nginx server configuration
            sudo systemctl reload nginx
            
            echo "✅ Deployment finished successfully!"

