name: Backend Enterprise CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  security-and-dependencies:
    name: Security & Dependency Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Security Audit
        run: |
          cd backend
          npm audit --audit-level=critical || true

      - name: Validate Unused & Missing Dependencies
        run: |
          cd backend
          npx depcheck --ignores="jest,ts-jest,prettier,eslint,@nestjs/cli,ts-node,typescript,rimraf" || true

  lint-format-types:
    name: Lint, Format, Types & Exports Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Prettier Formatting Check
        run: |
          cd backend
          npx prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Run ESLint Code Quality Checks
        run: |
          cd backend
          npm run lint || true

      - name: Strict TypeScript Compilation Typecheck
        run: |
          cd backend
          npx tsc --noEmit

      - name: Identify Unused Exports
        run: |
          cd backend
          npx ts-prune || true

  unit-testing:
    name: Unit Tests & Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Test Suite with Coverage
        run: |
          cd backend
          npm run test:cov || true

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 7

  compile-and-docker:
    name: Compilation & Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Compile NestJS Build
        run: |
          cd backend
          npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Compile
        run: |
          cd backend
          docker build -t finance-flow-backend:latest -f Dockerfile .
